version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo "Installing dependencies and verifying environment..."
      - java -version
      - mvn -version

  pre_build:
    commands:
      - echo "Navigating to backend-api directory..."
      - cd backend-api
      - chmod +x mvnw || true

  build:
    commands:
      - echo "Building Spring Boot Application JAR package..."
      - ./mvnw clean package -DskipTests

  post_build:
    commands:
      - echo "Build completed successfully on `date`."

artifacts:
  files:
    - backend-api/target/*.jar
  discard-paths: yes

cache:
  paths:
    - '/root/.m2/**/*'