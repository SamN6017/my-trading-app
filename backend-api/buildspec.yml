version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo "Installing dependencies and verifying environment..."
      - java -version
      - mvn -version

  pre_build:
    commands:
      - echo "Pre-build phase initialized on `date`..."
      - echo "Running clean up prior to packaging..."

  build:
    commands:
      - echo "Building Spring Boot Application JAR package..."
      # -DskipTests speeds up deployment; remove flag if you want JUnit tests to run in pipeline
      - mvn clean package -DskipTests

  post_build:
    commands:
      - echo "Build completed successfully on `date`."

artifacts:
  files:
    # Captures the compiled executable JAR file produced in the target directory
    - target/*.jar
  discard-paths: yes

cache:
  paths:
    # Caches local Maven repository to dramatically speed up future builds in CodeBuild
    - '/root/.m2/**/*'