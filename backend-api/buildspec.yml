version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo "Installing dependencies and verifying environment..."
      - java -version
      - mvn -version

  pre_build:
    commands:
      - echo "Navigating to backend directory..."
      # Replace 'backend' with your actual backend folder name if different
      - cd backend
      - chmod +x mvnw || true

  build:
    commands:
      - echo "Building Spring Boot Application JAR package..."
      # Using ./mvnw ensures the wrapper version matches your local setup
      - ./mvnw clean package -DskipTests

  post_build:
    commands:
      - echo "Build completed successfully on `date`."

artifacts:
  files:
    # Explicitly point to the target directory inside your backend folder
    - backend/target/*.jar
  discard-paths: yes

cache:
  paths:
    - '/root/.m2/**/*'