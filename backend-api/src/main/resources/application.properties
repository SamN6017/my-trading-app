spring.application.name=backend-api

# PostgreSQL Configuration - Pointed to AWS RDS
spring.datasource.url=jdbc:postgresql://my-trading-app-db.cp40uekga977.us-east-2.rds.amazonaws.com:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${AWS_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties
# Changed from 'validate' to 'update' so Spring Boot automatically creates your tables in the new clean cloud DB.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Configuration (Still local for now)
spring.data.redis.host=localhost
spring.data.redis.port=6379


# Pulls from JWT_SECRET_KEY env variable; defaults to the development string if missing
application.security.jwt.secret-key=${JWT_SECRET_KEY}